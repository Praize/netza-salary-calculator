<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>NetZA Logo — Concept A</title>
  <desc>NetZA salary calculator logo set including full wordmark, icon only, and favicon sizes</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;family=DM+Mono:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#0f0f0f"/>

  <!-- ── FULL WORDMARK (large) ── -->
  <g transform="translate(40, 40)">
    <!-- Icon badge -->
    <rect width="80" height="80" rx="18" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="1"/>
    <text x="15" y="65" font-family="'Syne', sans-serif" font-weight="800" font-size="58" fill="#f0f0f0">N</text>
    <line x1="10" y1="40" x2="68" y2="40" stroke="#00e87a" stroke-width="5" stroke-linecap="round"/>
    <polygon points="68,33 80,40 68,47" fill="#00e87a"/>

    <!-- Wordmark -->
    <text x="100" y="52" font-family="'Syne', sans-serif" font-weight="800" font-size="42" fill="#f0f0f0">Net<tspan fill="#00e87a">ZA</tspan></text>
    <text x="102" y="72" font-family="'DM Mono', monospace" font-weight="400" font-size="12" fill="#444444" letter-spacing="0.12em">SALARY CALCULATOR</text>
  </g>

  <!-- ── ICON ONLY (medium) ── -->
  <g transform="translate(40, 170)">
    <text x="4" y="-8" font-family="'DM Mono', monospace" font-size="10" fill="#333333" letter-spacing="0.1em">ICON — 120×120</text>
    <rect width="120" height="120" rx="26" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="1"/>
    <text x="20" y="102" font-family="'Syne', sans-serif" font-weight="800" font-size="90" fill="#f0f0f0">N</text>
    <line x1="14" y1="60" x2="106" y2="60" stroke="#00e87a" stroke-width="8" stroke-linecap="round"/>
    <polygon points="106,50 122,60 106,70" fill="#00e87a"/>
  </g>

  <!-- ── FAVICON 64×64 ── -->
  <g transform="translate(200, 170)">
    <text x="4" y="-8" font-family="'DM Mono', monospace" font-size="10" fill="#333333" letter-spacing="0.1em">FAVICON — 64×64</text>
    <rect width="64" height="64" rx="14" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="1"/>
    <text x="10" y="54" font-family="'Syne', sans-serif" font-weight="800" font-size="48" fill="#f0f0f0">N</text>
    <line x1="8" y1="32" x2="56" y2="32" stroke="#00e87a" stroke-width="4.5" stroke-linecap="round"/>
    <polygon points="56,27 65,32 56,37" fill="#00e87a"/>
  </g>

  <!-- ── FAVICON 32×32 ── -->
  <g transform="translate(300, 170)">
    <text x="4" y="-8" font-family="'DM Mono', monospace" font-size="10" fill="#333333" letter-spacing="0.1em">FAVICON — 32×32</text>
    <rect width="32" height="32" rx="7" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="1"/>
    <text x="5" y="27" font-family="'Syne', sans-serif" font-weight="800" font-size="24" fill="#f0f0f0">N</text>
    <line x1="4" y1="16" x2="28" y2="16" stroke="#00e87a" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="28,12.5 33,16 28,19.5" fill="#00e87a"/>
  </g>

  <!-- ── FAVICON 16×16 ── -->
  <g transform="translate(370, 170)">
    <text x="4" y="-8" font-family="'DM Mono', monospace" font-size="10" fill="#333333" letter-spacing="0.1em">FAVICON — 16×16</text>
    <rect width="16" height="16" rx="3" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="0.5"/>
    <text x="2" y="13" font-family="'Syne', sans-serif" font-weight="800" font-size="12" fill="#f0f0f0">N</text>
    <line x1="2" y1="8" x2="14" y2="8" stroke="#00e87a" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="14,6 17,8 14,10" fill="#00e87a"/>
  </g>

  <!-- ── LIGHT BACKGROUND VARIANT ── -->
  <g transform="translate(40, 320)">
    <text x="4" y="-8" font-family="'DM Mono', monospace" font-size="10" fill="#333333" letter-spacing="0.1em">LIGHT VARIANT</text>
    <rect width="80" height="54" rx="12" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
    <text x="10" y="43" font-family="'Syne', sans-serif" font-weight="800" font-size="38" fill="#0a0a0a">N</text>
    <line x1="8" y1="27" x2="68" y2="27" stroke="#00c463" stroke-width="4" stroke-linecap="round"/>
    <polygon points="68,22 78,27 68,32" fill="#00c463"/>

    <!-- Light wordmark -->
    <text x="96" y="32" font-family="'Syne', sans-serif" font-weight="800" font-size="28" fill="#0a0a0a">Net<tspan fill="#00c463">ZA</tspan></text>
    <text x="98" y="48" font-family="'DM Mono', monospace" font-weight="400" font-size="10" fill="#888888" letter-spacing="0.1em">SALARY CALCULATOR</text>
  </g>

  <!-- Colour swatches -->
  <g transform="translate(420, 320)">
    <text x="0" y="-8" font-family="'DM Mono', monospace" font-size="10" fill="#333333" letter-spacing="0.1em">PALETTE</text>
    <rect width="32" height="32" rx="6" fill="#00e87a"/>
    <text x="0" y="46" font-family="'DM Mono', monospace" font-size="9" fill="#444444">#00e87a</text>
    <rect x="42" width="32" height="32" rx="6" fill="#f0f0f0"/>
    <text x="42" y="46" font-family="'DM Mono', monospace" font-size="9" fill="#444444">#f0f0f0</text>
    <rect x="84" width="32" height="32" rx="6" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
    <text x="84" y="46" font-family="'DM Mono', monospace" font-size="9" fill="#444444">#0a0a0a</text>
  </g>

</svg>
